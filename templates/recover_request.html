<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Восстановление</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<div class="container" style="max-width:500px; margin-top:50px;">
    <div class="auth-form-container">
        <h2>🔑 Восстановление доступа</h2>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
        
        <form method="post">
            <div class="form-group">
                <label>Email аккаунта:</label>
                <input type="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Отправить код</button>
        </form>
        <a href="/login" style="display:block; text-align:center; margin-top:15px;">Назад ко входу</a>
    </div>
</div>
</body>
</html>
